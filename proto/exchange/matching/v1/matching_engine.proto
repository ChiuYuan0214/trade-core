syntax = "proto3";

package exchange.matching.v1;

option go_package = "local.exchange-demo/exchange-core-go/gen/proto/exchange/matching/v1;matchingv1";
option java_multiple_files = true;
option java_outer_classname = "MatchingEngineProto";
option java_package = "com.exchangedemo.matching.proto";

service MatchingEngineService {
  rpc ApplyOrder(ApplyOrderRequest) returns (ApplyOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}

message ApplyOrderRequest {
  MatchingOrder order = 1;
}

message ApplyOrderResponse {
  MatchingOrder incoming_order = 1;
  repeated MatchingOrder order_updates = 2;
  repeated TradeView trades = 3;
  uint64 sequence = 4;
}

message CancelOrderRequest {
  string symbol = 1;
  string order_id = 2;
}

message CancelOrderResponse {
  bool found = 1;
  MatchingOrder order = 2;
  uint64 sequence = 3;
}

message MatchingOrder {
  string order_id = 1;
  string client_order_id = 2;
  string user_id = 3;
  string symbol = 4;
  string side = 5;
  string type = 6;
  string price = 7;
  string quantity = 8;
  string filled_quantity = 9;
  string status = 10;
  string rejection_reason = 11;
  string created_at = 12;
  string updated_at = 13;
}

message TradeView {
  string trade_id = 1;
  string symbol = 2;
  string maker_order_id = 3;
  string taker_order_id = 4;
  string maker_user_id = 5;
  string taker_user_id = 6;
  string price = 7;
  string quantity = 8;
  string maker_fee = 9;
  string taker_fee = 10;
  string executed_at = 11;
}
